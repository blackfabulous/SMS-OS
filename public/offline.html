<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZimSchool Pro - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #ecfdf5 0%, #f0fdfa 50%, #f5f3ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .icon-wrapper {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #10b981, #14b8a6);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 10px 40px rgba(16, 185, 129, 0.3);
    }
    .icon-wrapper svg {
      width: 40px;
      height: 40px;
      fill: white;
    }
    h1 {
      color: #064e3b;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p {
      color: #6b7280;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #10b981, #14b8a6);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }
    .retry-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
    }
    .status {
      margin-top: 32px;
      padding: 12px 16px;
      background: #fef3c7;
      border: 1px solid #fbbf24;
      border-radius: 12px;
      color: #92400e;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>ZimSchool Pro can't connect to the internet right now. Some features may still be available from cache.</p>
    <button class="retry-btn" onclick="window.location.reload()">
      &#x21bb; Try Again
    </button>
    <div class="status">
      Your data is safe. Changes will sync when you're back online.
    </div>
  </div>
</body>
</html>
