name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zimschool_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zimschool_test
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zimschool_test
        run: npm run test

      - name: Build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zimschool_test
        run: npm run build
